on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "**"

name: "PHPUnit & Codecov"

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04]
        php-version: [8.1]
        symfony-version: ["5.4.*", "6.0.*", "6.1.*"]
        experimental: [false]

    steps:
      - name: "Checkout"
        uses: actions/checkout@cd7d8d697e10461458bc61a30d094dc601a8b017

      - name: Setup PHP
        uses: shivammathur/setup-php@73963f5001e335723c998e4a0125ce060083985c
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ctype, dom, json, libxml, mbstring, pdo_sqlite, simplexml, tokenizer, xml, xmlwriter
          coverage: none
          tools: composer

      - name: Specify symfony version
        uses: jacobtomlinson/gha-find-replace@843224ee88a2d3b82ab00c5e6cc4633f9d765520
        with:
          include: "composer.json"
          find: "^5.4|^6.0"
          replace: "${{ matrix.symfony-version }}"
          regex: false

      - name: "Get composer Cache directory"
        id: composer-cache
        run: |
          echo "composer_cache_output_dir=dir::$(composer config cache-files-dir)" >> $GITHUB_ENV
      #          echo "::set-output name=dir::$(composer config cache-files-dir)"

      - name: "Cache composer dependencies"
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9
        with:
          path: ${{ env.composer_cache_output_dir }}
          key: composer-${{ runner.os }}-${{ matrix.php-version }}-${{ matrix.symfony-version }}-${{ hashFiles('composer.*') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php-version }}-${{ matrix.symfony-version }}
            composer-${{ runner.os }}-${{ matrix.php-version }}-
            composer-${{ runner.os }}-
            composer-

      - name: "Install composer dependencies"
        uses: php-actions/composer@8a65f0d3c6a1d17ca4800491a40b5756a4c164f3
        with:
          php_version: ${{ matrix.php-version }}
          dev: yes
          args: --no-interaction --no-progress --optimize-autoloader

      - name: "Run tests"
        uses: php-actions/phpunit@20a16022e567b98194f755ba5b70c9a0e16c5fc2
        env:
          CMLIFE_USERNAME: ${{ secrets.CMLIFE_USERNAME }}
          CMLIFE_PASSWORD: ${{ secrets.CMLIFE_PASSWORD }}
          CMLIFE_SESSION_ID: ${{ secrets.CMLIFE_SESSION_ID }}
          CMLIFE_XSRF_TOKEN: ${{ secrets.CMLIFE_XSRF_TOKEN }}
        with:
          configuration: phpunit.xml.dist
          php_version: ${{ matrix.php-version }}
          php_extensions: ctype dom json libxml mbstring pdo_sqlite simplexml tokenizer xml xmlwriter

  code-coverage:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-20.04 ]
        php-version: [ 8.1 ]
        experimental: [ false ]

    steps:
      - name: "Checkout"
        uses: actions/checkout@cd7d8d697e10461458bc61a30d094dc601a8b017

      - name: Setup PHP
        uses: shivammathur/setup-php@73963f5001e335723c998e4a0125ce060083985c
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ctype, dom, json, libxml, mbstring, pdo, simplexml, tokenizer, xdebug, xml, xmlwriter
          coverage: xdebug
          tools: composer

      - name: "Get composer Cache directory"
        id: composer-cache
        run: |
          echo "composer_cache_output_dir=dir::$(composer config cache-files-dir)" >> $GITHUB_ENV
#          echo "::set-output name=dir::$(composer config cache-files-dir)"

      - name: "Cache composer dependencies"
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9
        with:
          path: ${{ env.composer_cache_output_dir }}
          key: composer-${{ runner.os }}-${{ matrix.php-version }}-${{ hashFiles('composer.*') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php-version }}-
            composer-${{ runner.os }}-
            composer-

      - name: "Install composer dependencies"
        uses: php-actions/composer@8a65f0d3c6a1d17ca4800491a40b5756a4c164f3
        with:
          php_version: ${{ matrix.php-version }}
          dev: yes
          args: --no-interaction --no-progress --optimize-autoloader

      - name: "Run tests"
        uses: php-actions/phpunit@20a16022e567b98194f755ba5b70c9a0e16c5fc2
        env:
          CMLIFE_USERNAME: ${{ secrets.CMLIFE_USERNAME }}
          CMLIFE_PASSWORD: ${{ secrets.CMLIFE_PASSWORD }}
          CMLIFE_SESSION_ID: ${{ secrets.CMLIFE_SESSION_ID }}
          CMLIFE_XSRF_TOKEN: ${{ secrets.CMLIFE_XSRF_TOKEN }}
          XDEBUG_MODE: coverage
        with:
          php_version: ${{ matrix.php-version }}
          php_extensions: ctype dom json libxml mbstring pdo simplexml tokenizer xml xmlwriter xdebug
          configuration: .github/workflows/phpunit.xml.dist

      - name: "Upload coverage to Codecov"
        uses: codecov/codecov-action@c16abc29c95fcf9174b58eb7e1abf4c866893bc8
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: true
          verbose: true